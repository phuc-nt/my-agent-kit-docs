title: My Agent Kit
description: AI coding agent kit — 14 agents, 80+ skills, structured workflows

remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme

baseurl: "/my-agent-kit-docs"
url: "https://phuc-nt.github.io"

logo: "/assets/logos/logo-stack-monochrome.svg"

color_scheme: brand

search_enabled: true
search:
  heading_level: 2
  previews: 3

nav_sort: order

aux_links:
  "GitHub":
    - "https://github.com/phuc-nt/my-agent-kit"
  "npm":
    - "https://www.npmjs.com/package/my-agent-kit"

aux_links_new_tab: true

footer_content: "MIT License &middot; <a href=\"https://github.com/phuc-nt/my-agent-kit\">GitHub</a> &middot; <a href=\"https://www.npmjs.com/package/my-agent-kit\">npm</a>"

back_to_top: true
back_to_top_text: "Back to top"

# Heading anchor links
heading_anchors: true

# kramdown
kramdown:
  syntax_highlighter_opts:
    block:
      line_numbers: false
